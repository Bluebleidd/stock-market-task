services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_market_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d stock_market_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  app1:
    build: .
    command: ["${APP_PORT}"]
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=postgres://user:password@db:5432/stock_market_db?sslmode=disable

  app2:
    build: .
    command: ["8081"]
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=postgres://user:password@db:5432/stock_market_db?sslmode=disable