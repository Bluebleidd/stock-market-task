services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_market_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d stock_market_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  app1:
    build: .
    command: ["8080"]
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=postgres://user:password@db:5432/stock_market_db?sslmode=disable

  app2:
    build: .
    command: ["8080"]
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=postgres://user:password@db:5432/stock_market_db?sslmode=disable

  loadbalancer:
    image: nginx:alpine
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2